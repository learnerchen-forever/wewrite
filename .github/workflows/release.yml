name: Smart Release

on:
  push:
    branches: [master, main]
    paths:
      - 'manifest.json'

permissions:
  contents: write

jobs:
  smart-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read version from manifest.json
        id: read_version
        run: |
          VERSION=$(jq -r .version manifest.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists. Skipping release."
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
          else
            echo "SKIP_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Type check
        if: env.SKIP_RELEASE != 'true'
        run: npx tsc --noEmit --skipLibCheck

      - name: Run unit tests
        if: env.SKIP_RELEASE != 'true'
        run: npm test

      - name: Build plugin
        if: env.SKIP_RELEASE != 'true'
        run: npm run build

      - name: Update versions.json
        if: env.SKIP_RELEASE != 'true'
        run: |
          jq --arg v "$VERSION" --argjson m "$(cat manifest.json)" \
            '. + {($v): $m}' versions.json > versions.tmp.json
          mv versions.tmp.json versions.json

      - name: Commit updated versions.json
        if: env.SKIP_RELEASE != 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add versions.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update versions.json for $VERSION"
            git push
          fi

      - name: Create and push Git tag
        if: env.SKIP_RELEASE != 'true'
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        id: create_release
        if: env.SKIP_RELEASE != 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          files: |
            main.js
            manifest.json
            styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
